name: Update Parent Repository Submodule

on:
  push:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  update-parent-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Update FreegleDocker submodule reference
        env:
          GH_TOKEN: ${{ secrets.FREEGLE_DOCKER_TOKEN }}
          # Pass all GitHub context values as env vars — never interpolate
          # ${{ }} directly into the shell script body, as multi-line commit
          # messages can contain shell metacharacters (>, ", &, etc.) that
          # cause parse errors or unintended redirects.
          TRIGGER_SHA: ${{ github.sha }}
          TRIGGER_REPO: ${{ github.repository }}
          TRIGGER_BRANCH: ${{ github.ref_name }}
          TRIGGER_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "🔄 Updating FreegleDocker submodule reference"
          echo "Repository: $TRIGGER_REPO"
          echo "Branch: $TRIGGER_BRANCH"
          echo "Commit: $TRIGGER_SHA"

          # Determine submodule name from repository
          REPO_NAME=$(echo "$TRIGGER_REPO" | cut -d'/' -f2)
          echo "Submodule name: $REPO_NAME"

          # Clone FreegleDocker (no --depth 1 so we can rebase)
          echo "Cloning FreegleDocker..."
          git clone https://x-access-token:${GH_TOKEN}@github.com/Freegle/FreegleDocker.git
          cd FreegleDocker

          # Configure git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Initialize and update just this submodule to get .git metadata
          git submodule init "$REPO_NAME"
          git submodule update "$REPO_NAME"

          # Update submodule to the specific commit that triggered this workflow
          echo "Updating $REPO_NAME submodule to commit $TRIGGER_SHA..."
          cd "$REPO_NAME"
          git fetch origin "$TRIGGER_SHA"
          git checkout "$TRIGGER_SHA"
          cd ..

          # Check if there are changes
          if git diff --quiet "$REPO_NAME"; then
            echo "✅ Submodule already at correct commit - no update needed"
            exit 0
          fi

          # Take first line of commit message only, sanitise for use as git message
          COMMIT_MSG=$(printf '%s' "$TRIGGER_COMMIT_MSG" | head -1 | tr -d '"' | sed 's/^[[:space:]]*//')

          # Push with retry logic to handle concurrent submodule updates
          MAX_RETRIES=5
          RETRY_DELAY=2

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Push attempt $i of $MAX_RETRIES..."

            # Stage the submodule change
            git add "$REPO_NAME"

            # Check if there are changes to commit (might be up to date after rebase)
            if git diff --cached --quiet; then
              echo "✅ Submodule already at correct commit after rebase - no update needed"
              exit 0
            fi

            # Commit
            git commit -m "Update $REPO_NAME submodule - $COMMIT_MSG"

            # Try to push
            if git push origin master; then
              echo "✅ Successfully updated FreegleDocker submodule reference"
              echo "CircleCI will automatically trigger from this push"
              exit 0
            fi

            echo "⚠️ Push failed (likely concurrent update), retrying..."

            # Pull with rebase to incorporate other changes
            # Reset our commit, pull latest, then our change will be re-staged in next iteration
            git reset --soft HEAD~1
            git fetch origin master
            git reset --hard origin/master

            # Re-checkout the submodule to the correct commit
            cd "$REPO_NAME"
            git checkout "$TRIGGER_SHA"
            cd ..

            # Wait before retrying (exponential backoff)
            SLEEP_TIME=$((RETRY_DELAY * i))
            echo "Waiting ${SLEEP_TIME}s before retry..."
            sleep $SLEEP_TIME
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1
